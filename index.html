<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML iframe 實際示範</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            margin: 20px;
        }
        h1 { color: #333; }
        iframe {
            border: 2px solid #ccc;
            border-radius: 8px;
            margin: 15px 0;
        }
    </style>
</head>
<body>

    <h1>HTML iframe 實際示範</h1>

    <h2>1. 嵌入 YouTube 影片</h2>
    <iframe 
    width="560" 
    height="315" 
    src="https://www.youtube-nocookie.com/embed/jNQXAC9IVRw" 
    title="YouTube video player" 
    frameborder="0" 
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
    allowfullscreen
    referrerpolicy="strict-origin-when-cross-origin"
    loading="lazy">
	</iframe>

    <h2>2. 嵌入 Google 地圖</h2>
    <iframe width="600" height="450" 
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3615.0!2d121.5!3d25.0!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMjXCsDAwJzAwLjAiTiAxMjHCsDMwJzAwLjAiRQ!5e0!3m2!1szh-TW!2stw!4v1234567890" 
            style="border:0;" 
            allowfullscreen="" 
            loading="lazy">
    </iframe>

    <h2>3. 嵌入其他網站（範例）</h2>
    <iframe src=" https://patrickf127.github.io/yungshiu/" 
            width="100%" 
            height="500px" 
            title="W3Schools 範例">
    </iframe>

</body>
</html>
